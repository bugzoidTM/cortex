<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cortex by Nutef">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B9DE0"/>
      <stop offset="100%" stop-color="#1E5BB8"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2EA7E8"/>
      <stop offset="100%" stop-color="#1E5BB8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- fundo -->
  <rect width="760" height="320" rx="24" fill="#0C1A2E"/>

  <!-- conexões neurais do "C" -->
  <g stroke="url(#blueGrad)" stroke-width="4" stroke-linecap="round" opacity="0.9" filter="url(#glow)">
    <line x1="242.8" y1="98.9"  x2="194.6" y2="68.2"/>
    <line x1="194.6" y1="68.2"  x2="137.5" y2="70.7"/>
    <line x1="137.5" y1="70.7"  x2="87.7"  y2="112.5"/>
    <line x1="87.7"  y1="112.5" x2="75"    y2="160"/>
    <line x1="75"    y1="160"   x2="87.7"  y2="207.5"/>
    <line x1="87.7"  y1="207.5" x2="137.5" y2="249.3"/>
    <line x1="137.5" y1="249.3" x2="194.6" y2="251.8"/>
    <line x1="194.6" y1="251.8" x2="242.8" y2="221.1"/>
    <!-- sinapses internas -->
    <line x1="155" y1="160" x2="194.6" y2="68.2"  stroke-width="2.5" opacity="0.5"/>
    <line x1="155" y1="160" x2="75"    y2="160"   stroke-width="2.5" opacity="0.5"/>
    <line x1="155" y1="160" x2="194.6" y2="251.8" stroke-width="2.5" opacity="0.5"/>
  </g>

  <!-- nós -->
  <g filter="url(#glow)">
    <circle cx="242.8" cy="98.9"  r="9"  fill="url(#blueGrad)"/>
    <circle cx="194.6" cy="68.2"  r="9"  fill="#F5A623"/>
    <circle cx="137.5" cy="70.7"  r="9"  fill="url(#blueGrad)"/>
    <circle cx="87.7"  cy="112.5" r="9"  fill="url(#blueGrad)"/>
    <circle cx="75"    cy="160"   r="9"  fill="url(#blueGrad)"/>
    <circle cx="87.7"  cy="207.5" r="9"  fill="url(#blueGrad)"/>
    <circle cx="137.5" cy="249.3" r="9"  fill="url(#blueGrad)"/>
    <circle cx="194.6" cy="251.8" r="9"  fill="#F5A623"/>
    <circle cx="242.8" cy="221.1" r="9"  fill="url(#blueGrad)"/>
    <circle cx="155"   cy="160"   r="13" fill="url(#blueGrad)"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="188" font-family="Montserrat, Poppins, 'Segoe UI', sans-serif" font-weight="800"
        font-size="96" letter-spacing="-2" fill="url(#wordGrad)">cortex</text>
  <!-- tagline -->
  <text x="304" y="232" font-family="Montserrat, Poppins, 'Segoe UI', sans-serif" font-weight="400"
        font-size="19.5" letter-spacing="6" fill="#D6D3C4">NÚCLEO DE CONTEÚDO AUTÔNOMO</text>
  <!-- assinatura -->
  <text x="305" y="264" font-family="Montserrat, Poppins, 'Segoe UI', sans-serif" font-weight="500"
        font-size="15" letter-spacing="3" fill="#5C7A99">by NUTEF</text>
</svg>
