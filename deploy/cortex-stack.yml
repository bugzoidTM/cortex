version: "3.8"

services:
  db:
    image: postgres:16-alpine
    networks:
      - Nutef
    environment:
      POSTGRES_DB: cortex
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD_FILE: /run/secrets/cortex_postgres_password
    secrets:
      - cortex_postgres_password
    volumes:
      - cortex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex -d cortex"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  web:
    image: cortex:latest
    networks:
      - Nutef
    secrets:
      - cortex_postgres_password
      - cortex_openai_compatible_api_key
      - cortex_byok_encryption_secret
      - cortex_woovi_app_id
      - cortex_woovi_webhook_secret
      - cortex_smtp_password_v2
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      OPENAI_COMPATIBLE_API_KEY_FILE: "/run/secrets/cortex_openai_compatible_api_key"
      CORTEX_BYOK_ENCRYPTION_SECRET_FILE: "/run/secrets/cortex_byok_encryption_secret"
      WOOVI_APP_ID_FILE: "/run/secrets/cortex_woovi_app_id"
      CORTEX_WOOVI_WEBHOOK_SECRET_FILE: "/run/secrets/cortex_woovi_webhook_secret"
      SMTP_PASSWORD_FILE: "/run/secrets/cortex_smtp_password_v2"
      SMTP_HOST: "smtp-relay.brevo.com"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: "aed8b3001@smtp-brevo.com"
      SMTP_FROM: "Cortex <cortex@nutef.com>"
      WOOVI_API_BASE_URL: "https://api.woovi.com"
      CORTEX_PUBLIC_URL: "https://cortex.nutef.com"
      CORTEX_MAX_JOB_INPUT_TOKENS: "2500"
      CORTEX_SUPERUSER_EMAILS: "admin@nutef.com"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=Nutef
        - traefik.http.routers.cortex.rule=Host(`cortex.nutef.com`)
        - traefik.http.routers.cortex.entrypoints=websecure
        - traefik.http.routers.cortex.tls=true
        - traefik.http.routers.cortex.tls.certresolver=letsencryptresolver
        - traefik.http.services.cortex.loadbalancer.server.port=3000
        - traefik.http.services.cortex.loadbalancer.passHostHeader=true

  worker:
    image: cortex:latest
    networks:
      - Nutef
    secrets:
      - cortex_postgres_password
      - cortex_openai_compatible_api_key
      - cortex_byok_encryption_secret
      - cortex_woovi_app_id
      - cortex_woovi_webhook_secret
      - cortex_smtp_password_v2
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_COMPATIBLE_API_KEY_FILE: "/run/secrets/cortex_openai_compatible_api_key"
      CORTEX_BYOK_ENCRYPTION_SECRET_FILE: "/run/secrets/cortex_byok_encryption_secret"
      WOOVI_APP_ID_FILE: "/run/secrets/cortex_woovi_app_id"
      CORTEX_WOOVI_WEBHOOK_SECRET_FILE: "/run/secrets/cortex_woovi_webhook_secret"
      SMTP_PASSWORD_FILE: "/run/secrets/cortex_smtp_password_v2"
      SMTP_HOST: "smtp-relay.brevo.com"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: "aed8b3001@smtp-brevo.com"
      SMTP_FROM: "Cortex <cortex@nutef.com>"
      WOOVI_API_BASE_URL: "https://api.woovi.com"
      CORTEX_PUBLIC_URL: "https://cortex.nutef.com"
      CORTEX_MAX_JOB_INPUT_TOKENS: "2500"
      CORTEX_WORKER_POLL_INTERVAL_MS: "5000"
      # Opcional: webhook (Slack/Discord/etc.) para alerta de job falho e erro do worker.
      # CORTEX_ALERT_WEBHOOK_URL: "https://hooks.slack.com/services/XXX"
    command: >
      sh -c 'DB_PASSWORD=$$(node -e "process.stdout.write(encodeURIComponent(require('"'"'fs'"'"').readFileSync('"'"'/run/secrets/cortex_postgres_password'"'"', '"'"'utf8'"'"').trim()))"); export DATABASE_URL="postgresql://cortex:$${DB_PASSWORD}@db:5432/cortex?schema=public"; node scripts/cortex-worker.mjs'
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  backup:
    image: cortex:latest
    networks:
      - Nutef
    secrets:
      - cortex_postgres_password
    volumes:
      - cortex_postgres_backups:/backups
    environment:
      CORTEX_BACKUP_DIR: "/backups"
      CORTEX_BACKUP_RETENTION_DAYS: "7"
      CORTEX_BACKUP_INTERVAL_SECONDS: "86400"
      # Opcional: cópia offsite via rclone (remoto já configurado por env RCLONE_CONFIG_* ou secret).
      # CORTEX_BACKUP_RCLONE_REMOTE: "s3cortex:cortex-backups"
      # Opcional: webhook para alerta de falha de backup.
      # CORTEX_ALERT_WEBHOOK_URL: "https://hooks.slack.com/services/XXX"
    command: sh scripts/backup-postgres.sh
    deploy:
      replicas: 1
      restart_policy:
        condition: any

secrets:
  cortex_postgres_password:
    external: true
  cortex_openai_compatible_api_key:
    external: true
  cortex_byok_encryption_secret:
    external: true
  cortex_woovi_app_id:
    external: true
  cortex_woovi_webhook_secret:
    external: true
  cortex_smtp_password_v2:
    external: true

volumes:
  cortex_postgres_data:
    external: false
  cortex_postgres_backups:
    external: false

networks:
  Nutef:
    external: true
    name: Nutef
