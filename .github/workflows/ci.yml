name: Cortex CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "deploy/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "deploy/**"
      - ".github/workflows/ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Contract tests
        run: |
          npm run test:smoke
          npm run test:data-contract
          npm run test:interactive-ui
          npm run test:llm-gateway
          npm run test:runtime-config
          npm run test:auth-tenancy
          npm run test:brand-profile
          npm run test:quota-guard
          npm run test:admin-panel
          npm run test:production-hardening
          npm run test:byok-trial
          npm run test:self-service-billing

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
